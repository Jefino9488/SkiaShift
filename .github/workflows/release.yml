name: Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug and Release APKs
      run: ./gradlew assembleDebug assembleRelease

    - name: Rename Release APK
      run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/SkiaShift-Release.apk
      
    - name: Rename Debug APK
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/SkiaShift-Debug.apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/release/SkiaShift-Release.apk
          app/build/outputs/apk/debug/SkiaShift-Debug.apk
        draft: false
        prerelease: false
        generate_release_notes: true
